    function loadQuiz() {
        const wrapper = document.getElementById('questions-wrapper');
        quizData.forEach((item, index) => {
            let optionsHTML = '';
            item.options.forEach((opt, optIdx) => {
                optionsHTML += `
                    <label class="option-label" id="label-${index}-${optIdx}">
                        <input type="radio" name="q${index}" value="${optIdx}" class="me-2"> ${String.fromCharCode(65 + optIdx)}. ${opt}
                    </label>
                `;
            });

            wrapper.innerHTML += `
                <div class="question-block" id="block-${index}">
                    <div class="question-text">Câu ${index + 1}: ${item.question}</div>
                    ${optionsHTML}
                </div>
            `;
        });
    }

    function checkAnswers() {
        let score = 0;
        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const correctIdx = item.answer;
            
            // Xóa các class cũ nếu có
            item.options.forEach((_, optIdx) => {
                document.getElementById(`label-${index}-${optIdx}`).classList.remove('correct', 'incorrect');
            });

            if (selected) {
                const userAns = parseInt(selected.value);
                if (userAns === correctIdx) {
                    score++;
                    document.getElementById(`label-${index}-${userAns}`).classList.add('correct');
                } else {
                    document.getElementById(`label-${index}-${userAns}`).classList.add('incorrect');
                    document.getElementById(`label-${index}-${correctIdx}`).classList.add('correct');
                }
            } else {
                document.getElementById(`label-${index}-${correctIdx}`).classList.add('correct');
            }
        });

        document.getElementById('score').innerText = score;
        document.getElementById('total').innerText = quizData.length;
        document.getElementById('result-area').style.display = 'block';
        
        const feedback = score === quizData.length ? "Xuất sắc! Bạn đã thuộc lòng điều lệnh." : "Bạn cần ôn tập thêm các nội dung chưa đúng.";
        document.getElementById('feedback').innerText = feedback;
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.onload = loadQuiz;
</script>
